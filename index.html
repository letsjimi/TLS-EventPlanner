<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TLS Event">
  <link rel="apple-touch-icon" href="assets/icon.svg">
  <link rel="manifest" href="manifest.json">
  <title>TLS Event Manager | Timon Live Sound</title>
  <meta name="description" content="Professionelles Event-Planungstool für Veranstaltungstechnik">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/mobile.css" media="(max-width:430px), (-webkit-touch-callout: none)">
  <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(console.error);
    }
  </script>
</head>
<body>
  <!-- ═══ SIDEBAR ═══ -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/>
          <polyline points="12 22 12 15.5"/>
          <polyline points="22 8.5 12 15.5 2 8.5"/>
        </svg>
      </div>
      <div class="brand-text">
        <div class="brand-title">TLS</div>
        <div class="brand-sub">Event Manager</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="#dashboard" class="nav-item active" data-page="dashboard">
        <i data-lucide="layout-dashboard"></i>
        <span>Dashboard</span>
      </a>
      <a href="#events" class="nav-item" data-page="events">
        <i data-lucide="calendar-days"></i>
        <span>Aufträge</span>
        <span class="nav-badge" id="nav-events-count">0</span>
      </a>
      <a href="#planner" class="nav-item" data-page="planner">
        <i data-lucide="map-pin"></i>
        <span>Planung</span>
      </a>
      <a href="#contacts" class="nav-item" data-page="contacts">
        <i data-lucide="users"></i>
        <span>Kontakte</span>
      </a>
      <a href="#equipment" class="nav-item" data-page="equipment">
        <i data-lucide="package"></i>
        <span>Equipment</span>
      </a>
      <a href="#catalog" class="nav-item" data-page="catalog">
        <i data-lucide="library"></i>
        <span>Katalog</span>
      </a>
      <a href="#calculation" class="nav-item" data-page="calculation">
        <i data-lucide="calculator"></i>
        <span>Kalkulation</span>
      </a>
      <a href="#personnel" class="nav-item" data-page="personnel">
        <i data-lucide="user-cog"></i>
        <span>Personal</span>
      </a>
      <a href="#market" class="nav-item" data-page="market">
        <i data-lucide="trending-up"></i>
        <span>Marktpreise</span>
      </a>
      <a href="#calendar" class="nav-item" data-page="calendar">
        <i data-lucide="calendar-days"></i>
        <span>Kalender</span>
      </a>
      <a href="#settings" class="nav-item" data-page="settings">
        <i data-lucide="settings"></i>
        <span>Einstellungen</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-ghost btn-sm" onclick="app.exportData()">
        <i data-lucide="download"></i>
        <span>Export</span>
      </button>
      <button class="btn-ghost btn-sm" onclick="app.importData()">
        <i data-lucide="upload"></i>
        <span>Import</span>
      </button>
      <button class="btn-ghost btn-sm" onclick="app.setPassword()" title="App-Passwort setzen">
        <i data-lucide="shield"></i>
        <span>Sicherheit</span>
      </button>
    </div>
  </aside>

  <!-- ═══ MOBILE SIDEBAR OVERLAY ═══ -->
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="app.toggleSidebar()"></div>

  <!-- ═══ MAIN CONTENT ═══ -->
  <main id="main" class="main">
    <header class="topbar">
      <button class="menu-toggle" id="menu-toggle" aria-label="Menü öffnen">
        <i data-lucide="menu"></i>
      </button>
      <div class="topbar-search">
        <i data-lucide="search"></i>
        <input type="text" placeholder="Aufträge, Kontakte, Equipment suchen..." id="global-search">
      </div>
      <div class="topbar-actions">
        <div class="topbar-user" style="position:relative">
          <button class="btn btn-ghost btn-sm" id="user-menu-btn" onclick="app.toggleUserMenu()"
            style="display:flex;align-items:center;gap:6px;color:var(--c-text-2)">
            <i data-lucide="user" style="width:16px;height:16px"></i>
            <span id="topbar-username">Timon</span>
            <i data-lucide="chevron-down" style="width:14px;height:14px"></i>
          </button>
          <div id="user-dropdown" class="user-dropdown" style="display:none;position:absolute;right:0;top:calc(100% + 8px);background:var(--c-bg-card);border:1px solid var(--c-border);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);min-width:180px;z-index:100;overflow:hidden">
            <button class="btn btn-ghost" style="width:100%;justify-content:flex-start;border-radius:0;padding:10px 14px;font-size:0.875rem" onclick="app.toggleUserMenu();Auth.showPasswordChange()">
              <i data-lucide="key" style="width:16px;height:16px"></i> Passwort ändern
            </button>
            <button class="btn btn-ghost" style="width:100%;justify-content:flex-start;border-radius:0;padding:10px 14px;font-size:0.875rem;color:var(--c-danger)" onclick="app.toggleUserMenu();Auth.logout()">
              <i data-lucide="log-out" style="width:16px;height:16px"></i> Abmelden
            </button>
          </div>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="app.exportPDF()" title="Als PDF drucken">
          <i data-lucide="printer"></i>
        </button>
        <button class="btn btn-primary" onclick="app.createEvent()">
          <i data-lucide="plus"></i>
          <span>Neuer Auftrag</span>
        </button>
      </div>
    </header>

    <div class="page-content" id="page-content">
      <!-- Pages werden dynamisch injected -->
    </div>
  </main>

  <!-- ═══ MODALS ═══ -->
  <div class="modal-overlay" id="modal-overlay"></div>

  <!-- ═══ TOASTS ═══ -->
  <div class="toast-container" id="toast-container"></div>

  <script src="js/version-check.js"></script>
  <script src="js/db.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // ═══ PWA STANDALONE DETECTION ═══
    if (navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches) {
      document.body.classList.add('pwa-standalone');
    }
    // ═══ SWIPE-GESTURE für Bottom-Sheet Modals ═══
    let touchStartY = 0;
    document.addEventListener('touchstart', e => {
      const m = e.target.closest('.modal');
      if (m) touchStartY = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchmove', e => {
      const m = e.target.closest('.modal');
      if (m && touchStartY && e.touches[0].clientY - touchStartY > 120 && e.target.scrollTop <= 0) {
        m.style.transform = `translateY(${e.touches[0].clientY - touchStartY}px)`;
        m.style.transition = 'none';
      }
    }, { passive: true });
    document.addEventListener('touchend', e => {
      const m = e.target.closest('.modal');
      if (m && touchStartY) {
        const dy = (e.changedTouches[0].clientY - touchStartY);
        if (dy > 100) { m.style.transition = ''; UI.closeModal(); }
        else { m.style.transform = ''; m.style.transition = ''; }
        touchStartY = 0;
      }
    });
  </script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
