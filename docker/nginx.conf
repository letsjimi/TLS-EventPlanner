# ───────────────────────────────────────────────
# TLS Event Manager — NGINX Config
# Optimized for SPA (Single Page Application)
# ───────────────────────────────────────────────

server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache manifest.json kurz (für Updates)
    location = /manifest.json {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # SPA Fallback: Alle Routen → index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Optional: Backup-Dateien served (wenn in ./backups gemountet)
    location /backups/ {
        alias /usr/share/nginx/html/backups/;
        autoindex on;
        add_header Content-Type application/json;
    }
}
